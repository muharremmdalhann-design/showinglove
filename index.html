<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Love Shooter - Mobile</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>

<style>
body{
margin:0;
overflow:hidden;
background:#020205;
font-family:'Courier New',Courier,monospace;
touch-action: none; /* Mobilde kaydırmayı engeller */
}

#ui{
position:absolute;
top:15px;
left:15px;
z-index:100;
display:flex;
flex-direction:row;
gap:10px;
pointer-events:none;
}

#meter-ui {
position: absolute;
top: 15px;
right: 15px;
z-index: 100;
display: flex;
flex-direction: column;
align-items: flex-end;
pointer-events: none;
width: 60%; /* Mobilde genişlik ayarı */
}

#love-container {
width: 100%;
max-width: 250px; /* Mobilde taşmaması için kısıtlandı */
height: 15px;
background: rgba(255, 255, 255, 0.1);
border: 2px solid #ff4757;
border-radius: 10px;
overflow: hidden;
}

#love-bar {
width: 0%;
height: 100%;
background: #ff4757; 
transition: width 0.3s ease;
}

#love-text {
color: white;
font-size: 10px;
font-weight: bold;
margin-bottom: 3px;
letter-spacing: 1px;
}

#game-over {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0, 0, 0, 0.9);
display: none;
flex-direction: column;
justify-content: center;
align-items: center;
z-index: 2000;
color: #ff4757;
text-align: center;
}

#game-over h1 {
font-size: 32px; /* Mobil için font küçültüldü */
margin: 0;
padding: 0 20px;
}

#instruction-overlay {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
display: flex;
justify-content: center;
align-items: center;
z-index: 500;
pointer-events: none;
}

#guide {
position: absolute;
top: 25px; 
left: 80px;
color: white;
font-size: 14px; /* Mobil için küçültüldü */
text-shadow: 0 0 10px #ff4757;
animation: pulse 1.5s infinite;
}

#shot-guide {
color: #ff4757;
font-size: 24px; /* Mobil için küçültüldü */
font-weight: bold;
text-align: center;
text-shadow: 0 0 20px rgba(255, 71, 87, 0.9);
padding: 15px;
background: rgba(0,0,0,0.6);
border-radius: 15px;
width: 80%;
}

@keyframes pulse {
  0% { opacity: 0.5; transform: scale(0.95); }
  50% { opacity: 1; transform: scale(1); }
  100% { opacity: 0.5; transform: scale(0.95); }
}

.heart-particle {
position: absolute;
pointer-events: none;
font-size: 20px;
z-index: 2500;
animation: floatOut 1.5s ease-out forwards;
}

@keyframes floatOut {
  0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
  100% { transform: translate(var(--tx), var(--ty)) scale(0) rotate(var(--tr)); opacity: 0; }
}

button{
background:rgba(255, 71, 87, 0.8);
color:white;
padding:10px;
width: 60px;
height: 60px;
border-radius:50%;
cursor:pointer;
border:2px solid white;
display: flex;
align-items: center;
justify-content: center;
font-size: 20px;
pointer-events:auto;
}

#resetBtn {
margin-top: 30px;
width: auto;
height: auto;
padding: 12px 25px;
border-radius: 8px;
font-size: 16px;
}
</style>
</head>

<body>

<div id="ui">
<button id="selfieBtn" title="Take Selfie">📸</button>
</div>

<div id="instruction-overlay">
<div id="guide">⬅️ START WITH SELFIE</div>
<div id="shot-guide" style="display:none;">HOLD HAND LIKE GUN AND SHOOT!</div>
</div>

<div id="meter-ui">
<div id="love-text">LOVE METER</div>
<div id="love-container"><div id="love-bar"></div></div>
</div>

<div id="game-over">
<h1>YOU GIVE SO MUCH LOVE!</h1>
<button id="resetBtn" onclick="resetGame()">PLAY AGAIN</button>
</div>

<script>
let hands, camera, detectedHands = [];
let targets = [];
let userImg = null;
let TARGET_COUNT = 6; // Mobilde ekran alanı dar olduğu için hedef sayısını hafif azalttım
let videoElement;
let sX=0, sY=0, pY=null;
let velocitySmooth=0, lastShotTime=0;

// AYARLARIN - DEĞİŞTİRİLMEDİ
const FIRE_THRESHOLD = -15;
const COOLDOWN = 350;

let shake=0, recoilOffset=0;
let loveScore = 0, maxLove = 100;
let isGameOver = false;
let gameActive = false; 

function setup(){
createCanvas(windowWidth,windowHeight);
document.getElementById("selfieBtn").onclick = takeSelfie;

hands=new Hands({locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
// Mobilde daha akıcı çalışması için modelComplexity 0'a çekildi
hands.setOptions({maxNumHands:1, modelComplexity:0, minDetectionConfidence:0.7, minTrackingConfidence:0.7});
hands.onResults(onResults);

videoElement=document.createElement('video');
// Mobilde ön kamerayı kullanması için ayar
camera=new Camera(videoElement,{
onFrame:async()=>{ await hands.send({image:videoElement}); },
width:480, height:640
});
camera.start();

for(let i=0;i<TARGET_COUNT;i++) spawnTarget();
}

function onPhotoReady() {
    document.getElementById('guide').style.display = 'none';
    document.getElementById('shot-guide').style.display = 'block';
}

function onResults(results){ 
    detectedHands=results.multiHandLandmarks; 
    if(detectedHands.length > 0 && userImg && !gameActive && !isGameOver) {
        gameActive = true;
        document.getElementById('shot-guide').style.display = 'none';
    }
}

function draw(){
let shakeX=random(-shake,shake);
let shakeY=random(-shake,shake);
translate(shakeX,shakeY);
shake*=0.9;
background(5,5,12);

if(!isGameOver){
for(let i=targets.length-1;i>=0;i--){
targets[i].update();
if(!targets[i].hit) targets[i].display(); 
}
for(let i=targets.length-1;i>=0;i--){
if(targets[i].hit) targets[i].display(); 
if(targets[i].dead) targets.splice(i,1);
}
if(targets.length < TARGET_COUNT) spawnTarget();
}

if(detectedHands && detectedHands.length>0 && !isGameOver && gameActive){
let hand=detectedHands[0], tip=hand[8];
// Telefon ayna görüntüsü için 1-tip.x
let rawX=(1-tip.x)*width, rawY=tip.y*height;
sX=lerp(sX,rawX,0.3); sY=lerp(sY,rawY,0.3);
if(pY==null) pY=rawY;
let velocity=rawY-pY;
velocitySmooth=lerp(velocitySmooth,velocity,0.4);
let now=millis();
if(velocitySmooth < FIRE_THRESHOLD && now-lastShotTime>COOLDOWN){
lastShotTime=now; fire(sX,sY);
}
pY=rawY;
recoilOffset=lerp(recoilOffset,0,0.2);
drawReticle(sX,sY-recoilOffset);
}
}

function fire(x,y){
for(let t of targets){
// Mobilde vuruş alanını bir miktar esnettim (50 -> 60)
if(!t.hit && dist(x,y,t.x,t.y)<60){
t.hit=true;
shake = 12; 
for(let i=0; i<5; i++) {
    createHTMLHeart(t.x, t.y, false);
}
updateLoveMeter(12.5);
}
}
recoilOffset=35;
push(); fill(255,255,255,80); rect(-width,-height,width*3,height*3); pop();
}

function updateLoveMeter(amount) {
if(isGameOver) return;
loveScore += amount;
if(loveScore >= maxLove) {
loveScore = maxLove;
endGame();
}
document.getElementById('love-bar').style.width = loveScore + '%';
}

function endGame() {
isGameOver = true;
shake = 30; 
document.getElementById('game-over').style.display = 'flex';
for(let i=0; i<60; i++) {
    setTimeout(() => createHTMLHeart(width/2, height/2, true), i * 20);
}
}

function createHTMLHeart(startX, startY, isFinal) {
    const heart = document.createElement('div');
    heart.className = 'heart-particle';
    heart.innerHTML = '❤️'; 
    const range = isFinal ? 600 : 200;
    const tx = (Math.random() - 0.5) * range;
    const ty = (Math.random() - 0.5) * range;
    const tr = (Math.random() - 0.5) * 360; 
    heart.style.setProperty('--tx', `${tx}px`);
    heart.style.setProperty('--ty', `${ty}px`);
    heart.style.setProperty('--tr', `${tr}deg`);
    heart.style.left = `${startX}px`;
    heart.style.top = `${startY}px`;
    const container = isFinal ? document.getElementById('game-over') : document.body;
    container.appendChild(heart);
    setTimeout(() => heart.remove(), 1500);
}

function resetGame() {
loveScore = 0;
shake = 0;
isGameOver = false;
gameActive = false;
userImg = null;
document.getElementById('love-bar').style.width = '0%';
document.getElementById('game-over').style.display = 'none';
document.getElementById('guide').style.display = 'block';
document.getElementById('shot-guide').style.display = 'none';
const hearts = document.querySelectorAll('.heart-particle');
hearts.forEach(h => h.remove());
}

class Target{
constructor(){
this.x=random(60,width-60); this.y=random(100,height-100);
this.v=p5.Vector.random2D().mult(random(0.7, 2.0));
this.a=random(TWO_PI); this.hit=false; this.o=255; this.dead=false;
// Mobilde dinamik hedef boyutu (Ekran genişliğinin %25'i)
this.size = width * 0.25;
if(this.size > 120) this.size = 120;
}
update(){
if(!this.hit){
this.x+=this.v.x; this.y+=this.v.y; this.a+=0.015;
if(this.x<40 || this.x>width-40) this.v.x*=-1;
if(this.y<80 || this.y>height-80) this.v.y*=-1;
}else{ this.o-=4; if(this.o<=0) this.dead=true; }
}
display(){
push(); translate(this.x,this.y);
if(this.hit){
textAlign(CENTER); fill(255,50,100,this.o); textSize(20); textStyle(BOLD); text("LOVE!",0,0);
}else{
rotate(this.a);
if(userImg){
imageMode(CENTER); 
let aspect=userImg.width/userImg.height;
let sx,sy,sw,sh;
if(aspect>1){ sw=userImg.height; sh=userImg.height; sx=(userImg.width-sw)/2; sy=0; }
else{ sw=userImg.width; sh=userImg.width; sx=0; sy=(userImg.height-sh)/2; }
image(userImg,0,0,this.size,this.size,sx,sy,sw,sh);
}else{ 
stroke(255, 150); noFill(); circle(0,0,this.size*0.8); 
}
}
pop();
}
}

function drawReticle(x,y){
push(); translate(x,y); noFill(); stroke(255,0,0); strokeWeight(3); 
let rSize = 50; // Nişangah boyutu mobil için optimize
circle(0,0,rSize);
stroke(0,255,255, 180); strokeWeight(1.5); line(-rSize*0.7,0,rSize*0.7,0); line(0,-rSize*0.7,0,rSize*0.7);
fill(255); noStroke(); circle(0,0,6); pop();
}

function spawnTarget(){ targets.push(new Target()); }

function takeSelfie(){
let tempCanvas=document.createElement("canvas");
tempCanvas.width=videoElement.videoWidth; tempCanvas.height=videoElement.videoHeight;
let ctx=tempCanvas.getContext("2d"); ctx.drawImage(videoElement,0,0);
userImg=loadImage(tempCanvas.toDataURL(), () => {
    onPhotoReady();
});
}

function windowResized(){ resizeCanvas(windowWidth,windowHeight); }
</script>
</body>
</html>
